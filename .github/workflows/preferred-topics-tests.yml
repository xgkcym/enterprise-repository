name: Backend Smoke Tests

on:
  push:
    paths:
      - ".github/workflows/preferred-topics-tests.yml"
      - ".env.example"
      - "alembic.ini"
      - "alembic/**"
      - "app.py"
      - "core/**"
      - "service/**"
      - "src/**"
      - "tests/**"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/preferred-topics-tests.yml"
      - ".env.example"
      - "alembic.ini"
      - "alembic/**"
      - "app.py"
      - "core/**"
      - "service/**"
      - "src/**"
      - "tests/**"
      - "requirements.txt"

jobs:
  backend-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            aiosqlite \
            bcrypt \
            fastapi \
            httpx \
            langchain-core \
            pydantic \
            pydantic-settings \
            python-dotenv \
            python-jose \
            python-multipart \
            SQLAlchemy \
            sqlmodel

      - name: Compile backend sources
        run: python -m compileall app.py core service src tests

      - name: Run backend smoke test suite
        run: |
          python -m unittest \
            tests.test_preferred_topics \
            tests.test_password_utils \
            tests.test_file_utils \
            tests.test_long_term_memory \
            tests.test_api_smoke
